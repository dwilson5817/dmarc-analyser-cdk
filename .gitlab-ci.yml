stages:
  - prepare
  - deploy

include:
  - component: $CI_SERVER_FQDN/infrastructure/cdk-deployment-base/js-cdk-deploy@1.1.3

download-lambda-artifacts:
  stage: prepare
  image: alpine:latest
  script:
    - apk add --no-cache curl unzip
    - |
      curl --fail --location --output artifacts.zip \
        "${CI_API_V4_URL}/projects/dmarc-analyser%2Fcron/jobs/artifacts/main/download?job=build"
    - unzip artifacts.zip
  artifacts:
    paths:
      - email_scrape_cron/function.zip
      - s3_put_handler/function.zip
